<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/estiloRegister.css">
</head>
<body>
    <section class="Form-register">
        <h4>Formulario Resgitro</h4>
        <input class="controls" type="text" name="Nombres" placeholder="Nombres">
        <input class="controls" type="text" name="Apellidos" placeholder="Apellidos">
        <select class="controls">
            <option value="" disabled selected>Seleccione su documento </option>
            <option value="CC">Cédula de ciudadanía</option>
            <option value="CE">Cédula de extranjería</option>
            <option value="TI">Tarjeta de identidad</option>
        </select>
        <input class="controls" type="text" name="Numero de docuento" placeholder="Numero de docuento">
        <input class="controls" type="text" name="Ciudad" placeholder="Ciudad">
        <input class="controls" type="text" name="Direccion" placeholder="Direccion">
        <input class="controls" type="text" name="Telefono" placeholder="Telefono">
        <input class="controls" type="email" name="Correo" placeholder="Correo">
        <input class="controls" type="password" name="Contraseña" placeholder="Contraseña">
        <input class="controls" type="password" name="Confirmar contraseña" placeholder="Confirmar contraseña">
        <p>Estoy de acuerdo con <a href="#">Terminos y condiciones</a></p>
        <input class="buttons" type="submit" name="" value="Registrarse">
        <p><a href="login.html">¿Ya tienes una cuenta? Inicia sesión</a></p>
    </section> 
</body>
</html>
